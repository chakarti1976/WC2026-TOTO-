name: Update WC 2026 Toto Data

on:
  # Run automatically every 2 hours during the World Cup (June–July 2026)
  schedule:
    - cron: '0 */2 * * *'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
  
  # Auto-run when Excel file is pushed
  push:
    paths:
      - '*.xlsx'
      - 'WC_2026_Toto__Participants_list.xlsx'
    branches:
      - main

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Extract data from Excel
        run: python extract_data.py

      - name: Check if data.js changed
        id: changes
        run: |
          if git diff --quiet data.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated data.js
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.js
          git commit -m "🤖 Auto-update data.js — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

  deploy:
    runs-on: ubuntu-latest
    needs: update-data
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # Get latest including potential data.js update

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
